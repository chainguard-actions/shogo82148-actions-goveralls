name: Test parallel-finished mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action in parallel-finished mode
        id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          parallel-finished: true
          shallow: true
        continue-on-error: true

      - name: Assert action ran in parallel-finished mode
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # parallel-finished mode sends a signal to Coveralls to mark parallel jobs done.
          # With shallow: true, server errors are tolerated.
          # We verify the action ran (either success or failure from Coveralls API).
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran in parallel-finished mode (outcome=$OUTCOME)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
