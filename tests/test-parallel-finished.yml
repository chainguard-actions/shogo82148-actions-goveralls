name: Test parallel-finished mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          github-token: ${{ github.token }}
          parallel-finished: true
          shallow: true

      - name: Assert action ran in parallel-finished mode
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # parallel-finished=true sends a "done" signal to Coveralls.
          # The Coveralls API may not be available in test environments.
          # With shallow=true, goveralls exits 0 on Coveralls server errors.
          # We verify the action ran (not skipped) to confirm setup is correct.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was unexpectedly skipped"
            exit 1
          fi
          echo "PASS: action ran in parallel-finished mode with outcome=${{ steps.action.outcome }}"
