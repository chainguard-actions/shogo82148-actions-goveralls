name: Test parallel mode with flag-name
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action in parallel mode with flag-name
        id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          path-to-profile: tests/fixtures/coverage.out
          parallel: true
          flag-name: Unit
          shallow: true
        continue-on-error: true

      - name: Assert action ran in parallel mode
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # parallel mode sends coverage with a flag name for parallel job tracking.
          # With shallow: true, Coveralls API errors are tolerated.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran in parallel mode (outcome=$OUTCOME)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
