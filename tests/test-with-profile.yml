name: Test with coverage profile
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a minimal Go coverage profile
        run: |
          cat > /tmp/coverage.out << 'EOF'
          mode: set
          github.com/example/repo/main.go:1.1,2.1 1 1
          EOF

      - id: action
        uses: .
        continue-on-error: true
        with:
          github-token: fake-token-for-testing
          path-to-profile: /tmp/coverage.out
          flag-name: "Unit"

      - name: Assert action was invoked (outcome is set)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ -z "$OUTCOME" ]; then
            echo "FAIL: action outcome was not set"
            exit 1
          fi
          echo "PASS: action was invoked with outcome=$OUTCOME"
