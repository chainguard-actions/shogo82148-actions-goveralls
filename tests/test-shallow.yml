name: Test shallow option
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a minimal Go coverage profile
        run: |
          cat > /tmp/coverage.out << 'EOF'
          mode: set
          github.com/example/repo/main.go:1.1,2.1 1 1
          EOF
      - id: action
        uses: .
        continue-on-error: true
        with:
          github-token: fake-token-for-testing
          path-to-profile: /tmp/coverage.out
          shallow: true
      - name: Assert action ran (outcome is success or failure, not skipped/cancelled)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ] || [ "$OUTCOME" = "cancelled" ]; then
            echo "FAIL: action was skipped or cancelled unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME (shallow=true, API error expected with fake token)"
